name: build-datascience-notebook-ssh
on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 9 * * 0
  push:
    branches:
      - main
    paths:
      - containers/datascience-notebook-ssh/**
jobs:
  build-datascience-notebook-ssh:
    permissions:
      contents: read
      id-token: write
      packages: write
    name: build-datascience-notebook-ssh
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/symmatree/tiles/datascience-notebook-ssh
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      REGISTRY_USER: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ github.token }}
      BASE_IMAGE: quay.io/jupyter/datascience-notebook
      BASE_TAG: "2025-05-24"
    steps:
      - uses: actions/checkout@v7

      # Resolve dotfiles-symm main to a concrete SHA and pass it in as a
      # build-arg. This adopts dotfiles main automatically (no manual pin-bump
      # PR) while keeping builds reproducible and cache-correct: the SHA is a
      # unique ARG value, so the git-clone/ansible layer busts only when main
      # actually moves. The resolved SHA is logged and baked into image labels.
      - name: Resolve dotfiles-symm main
        id: dotfiles
        run: |
          sha=$(git ls-remote https://github.com/symmatree/dotfiles-symm.git refs/heads/main | cut -f1)
          if [ -z "$sha" ]; then echo "could not resolve dotfiles-symm main" >&2; exit 1; fi
          echo "Building against dotfiles-symm main = $sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Docker Metadata
        id: docker-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          tags: |
            type=edge
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          context: ./containers/datascience-notebook-ssh
          containerfiles: |
            ./containers/datascience-notebook-ssh/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BASE_TAG=${{ env.BASE_TAG }}
            DOTFILES_REF=${{ steps.dotfiles.outputs.sha }}
          extra-args: |
            --disable-compression=false
            --cache-from=${{ env.IMAGE_NAME }}-cache
            --cache-to=${{ env.IMAGE_NAME }}-cache

      - name: Check images created
        run: buildah images | grep '${{ env.IMAGE_NAME }}'

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          extra-args: |
            --compression-format=zstd
