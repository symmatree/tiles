name: build-test
on:
  pull_request: {}
  push:
    branches:
      # Run post-commit to validate, also to update caches.
      - main
  workflow_dispatch: {}
  schedule:
    - cron: 0 8 * * *
jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - name: DateAndTimeStamps
        id: stamps
        run: |
          set -euo pipefail
          echo "DATESTAMP=$(date +'%Y%m%d')" | tee -a "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/changed-files
        id: changed_files
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        with:
          base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
      - uses: ./.github/actions/helm-setup

      - name: Build
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          ./build.sh

      # - name: Test
      #   run: |
      #     set -euo pipefail
      #     cd "${{ github.workspace }}"
      #     ./test.sh

      - name: Ensure no git changes
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          git diff --exit-code
