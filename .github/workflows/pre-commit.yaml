name: "pre-commit"
on:
  pull_request: {}
  push:
    branches:
      - main # Run post-commit to validate, also to update caches.
      - sbox
      - prod
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * *" # Daily at 0700 UTC just to see if it's green.

jobs:
  pre-commit:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      pull-requests: "write"

    steps:
      - uses: "actions/checkout@v6"
        with:
          fetch-depth: 0
      - uses: ./.github/actions/changed-files
        id: changed_files
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        with:
          base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
      - name: Skip when only fables submodule ref changed
        id: only_fables_ref
        run: |
          # Skip heavy steps only when changed-files ran and reported exactly one path: fables.
          # When changed-files did not run (e.g. workflow_dispatch), its outputs are empty -> do not skip.
          UNIQUE="${{ steps.changed_files.outputs.unique }}"
          if [ "$UNIQUE" = "fables" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - shell: bash
        name: "Make output directory"
        run: |
          mkdir -p "${{ runner.temp }}/txt-outputs/"

      - uses: pre-commit/action@v3.0.1
        name: pre-commit
        id: pre-commit
        if: steps.only_fables_ref.outputs.skip != 'true'
        env:
          # `no-commit-to-branch` fails when run --all-files against main.
          SKIP: "no-commit-to-branch"
        with:
          # What's a little script injection between friends?
          # extra_args: '--color=never --all-files | tee "${{ runner.temp }}/txt-outputs/pre-commit.txt"'
          extra_args: "--color=never --all-files"

      - name: Capture diffs for PR
        if: (success() || failure()) && github.event_name == 'pull_request' && steps.only_fables_ref.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Capture diffs for PR."
          mkdir -p "${{ runner.temp }}/txt-outputs/"
          git diff --color --word-diff=color | tee "${{ runner.temp }}/txt-outputs/pre-commit-diff.txt"

      - uses: ./.github/actions/attach-outputs
        name: Attach pre-commit outputs to PR
        if: (success() || failure()) && github.event_name == 'pull_request' && steps.only_fables_ref.outputs.skip != 'true'
        with:
          txt_output_dir: "${{ runner.temp }}/txt-outputs/"
          outcome: ${{ steps.pre-commit.outcome }}
