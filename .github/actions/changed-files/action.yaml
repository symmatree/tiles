name: "changed-files"
description: "Compute changed file list between two refs (base and head). Use after checkout with fetch-depth: 0."
inputs:
  base_sha:
    description: "Base commit SHA (e.g. github.event.pull_request.base.sha or github.event.before)"
    required: true
  head_sha:
    description: "Head commit SHA (e.g. github.event.pull_request.head.sha or github.event.after)"
    required: true
outputs:
  changed:
    description: "Newline-separated list of changed paths (raw from git diff, no trailing newline)"
runs:
  using: "composite"
  steps:
    - name: Compute changed files
      id: changed
      shell: bash
      run: |
        set -euo pipefail
        BASE="${{ inputs.base_sha }}"
        HEAD="${{ inputs.head_sha }}"
        # Try three-dot diff (merge-base) first; fall back to two-dot (direct range) if that fails.
        CHANGED=$(git diff --name-only "${BASE}"..."${HEAD}") || \
          CHANGED=$(git diff --name-only "${BASE}".."${HEAD}") || \
          { echo "Both git diff (three-dot and two-dot) failed for BASE=${BASE} HEAD=${HEAD}" >&2; exit 1; }
        # Use a unique delimiter so a path containing "EOF" (or similar) cannot break the heredoc.
        DELIM="CHANGED_FILES_END_7a3f"
        echo "changed<<${DELIM}" >> "$GITHUB_OUTPUT"
        printf '%s' "${CHANGED}" >> "$GITHUB_OUTPUT"
        echo "${DELIM}" >> "$GITHUB_OUTPUT"
