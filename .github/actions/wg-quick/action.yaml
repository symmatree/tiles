name: 'wg-quick'
description: 'Connect to a Wireguard VPN'
inputs:
  wg_config:
    description: 'Wireguard config'
    required: true
  conf_dir:
    description: 'Directory to write the Wireguard config file to (suggested: runner.temp)'
    required: true
outputs:
  wg_connected:
    description: 'Whether the Wireguard VPN is connected'
    value: ${{ steps.wireguard.outputs.wg_connected }}
runs:
  using: "composite"
  steps:
      - name: WG Quick
        id: wireguard
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.wg_config }}" ]; then
            echo "No Wireguard config provided"
            exit 1
          fi
          echo "Setting up Wireguard..."
          time sudo apt-get -y \
           -qq -o Dpkg::Progress-Fancy="0" -o APT::Color="0" -o Dpkg::Use-Pty="0" \
            install wireguard-tools
          echo "${{ inputs.wg_config }}" > "${{ inputs.conf_dir }}/wg0.conf"
          chmod 0600 "${{ inputs.conf_dir }}/wg0.conf"

          echo "=== Config file contents (base64 encoded, keys removed) ==="
          grep -v -E "^(PrivateKey|PublicKey)\s*=" "${{ inputs.conf_dir }}/wg0.conf" | base64 | base64

          echo "Connecting..."
          time sudo wg-quick up "${{ inputs.conf_dir }}/wg0.conf"
          echo "Connected"
          echo "wg_connected=1" | tee -a "$GITHUB_OUTPUT"

          conf="${{ inputs.conf_dir }}/wg0.conf"
          dns_server=$(grep -E '^DNS\s*=' "${conf}" | head -1 | sed 's/^DNS\s*=\s*//' | tr -d ' ' | cut -d, -f1)
          dns_server="${dns_server:-10.1.0.1}"

          echo "=== WireGuard diagnostics (informational) ==="
          set +e
          sudo wg show wg0
          handshake=$(sudo wg show wg0 latest-handshakes 2>/dev/null | awk '{print $2}' | head -1)
          if [ -z "${handshake}" ] || [ "${handshake}" = "0" ]; then
            echo "Latest handshake: none"
          else
            echo "Latest handshake: $(( $(date +%s) - handshake ))s ago"
          fi
          echo "Pinging VPN DNS ${dns_server}..."
          ping -c1 -W3 "${dns_server}"
          endpoint_host=$(grep -E '^Endpoint\s*=' "${conf}" | head -1 | sed 's/^Endpoint\s*=\s*//' | tr -d ' ' | cut -d: -f1)
          if [ -n "${endpoint_host}" ]; then
            echo "Resolving ${endpoint_host}..."
            getent hosts "${endpoint_host}"
          fi
          echo "Resolving storage.googleapis.com (Terraform GCS)..."
          getent hosts storage.googleapis.com
          echo "Resolving GitHub Actions OIDC host..."
          getent hosts run-actions-2-azure-eastus.actions.githubusercontent.com
          getent hosts actions.githubusercontent.com
          set -e
