name: "configure-deployment"
description: "Configure deployment settings and push tags as needed (Job 1 only; matrix legs never push)"
outputs:
  test_apply:
    description: "Whether to apply to test environment"
    value: ${{ steps.config.outputs.test_apply }}
  prod_apply:
    description: "Whether to apply to prod environment"
    value: ${{ steps.config.outputs.prod_apply }}
  test_tag_pushed:
    description: "Whether the test tag was pushed"
    value: ${{ steps.config.outputs.test_tag_pushed }}
  prod_tag_pushed:
    description: "Whether the prod tag was pushed"
    value: ${{ steps.config.outputs.prod_tag_pushed }}
runs:
  using: "composite"
  steps:
    - uses: actions/github-script@v9
      name: Configure deployment
      id: config
      with:
        script: |
          const { execSync } = require('child_process');

          const eventName = context.eventName;
          const ref = context.ref;
          const isPushToMain = eventName === 'push' && ref === 'refs/heads/main';
          const isPushToTestTag = eventName === 'push' && ref === 'refs/tags/test';
          const isPushToProdTag = eventName === 'push' && ref === 'refs/tags/prod';
          const isManualApply = eventName === 'workflow_dispatch' && context.payload.inputs?.apply === 'true';
          const manualEnvironments = context.payload.inputs?.environments || 'both';

          const manualTargetsTest = isManualApply && (manualEnvironments === 'test' || manualEnvironments === 'both');
          const manualTargetsProd = isManualApply && (manualEnvironments === 'prod' || manualEnvironments === 'both');

          // Push to main applies both environments; tag redeploys apply the matching env only.
          const testApply = manualTargetsTest || isPushToMain || isPushToTestTag;
          const prodApply = manualTargetsProd || isPushToMain || isPushToProdTag;

          execSync(`git config user.name "${context.actor}"`, { stdio: 'inherit' });
          execSync(`git config user.email "${context.actor}@users.noreply.github.com"`, { stdio: 'inherit' });

          let testTagPushed = false;
          let prodTagPushed = false;

          const pushTag = (name) => {
            console.log(`::notice title=Git::Pushing ${name} tag from ${ref}...`);
            const tagMessage = `Deployed by ${context.actor} from ${ref}`;
            execSync(`git tag -f -m "${tagMessage}" ${name} HEAD`, { stdio: 'inherit' });
            execSync(`git push -f origin ${name}`, { stdio: 'inherit' });
            console.log(`Pushed ${name} tag`);
          };

          if (isPushToMain) {
            if (!isPushToTestTag) {
              pushTag('test');
              testTagPushed = true;
            }
            if (!isPushToProdTag) {
              pushTag('prod');
              prodTagPushed = true;
            }
          } else {
            const tagsToPush = [
              { shouldPush: testApply && !isPushToTestTag, name: 'test' },
              { shouldPush: prodApply && !isPushToProdTag, name: 'prod' }
            ];
            for (const tag of tagsToPush) {
              if (tag.shouldPush) {
                pushTag(tag.name);
                if (tag.name === 'test') testTagPushed = true;
                if (tag.name === 'prod') prodTagPushed = true;
              }
            }
          }

          core.setOutput('test_apply', testApply.toString());
          core.setOutput('prod_apply', prodApply.toString());
          core.setOutput('test_tag_pushed', testTagPushed.toString());
          core.setOutput('prod_tag_pushed', prodTagPushed.toString());
