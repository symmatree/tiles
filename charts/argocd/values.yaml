    # grafana-apiKey:
    #   # For more information: https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/services/grafana/

    # webhooks-github-token:

    # email-username:
    # email-password:
    # For more information: https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/services/email/
  repoServer:
    # Repo-server main container: allow healthz to survive brief load spikes (default timeout 1s is tight).
    livenessProbe:
      timeoutSeconds: 5
      failureThreshold: 3
    # Following https://raynix.info/archives/4565
    extraContainers:
      - name: tanka
        # We need git for downloading dependencies with jb.
        image: prontotools/alpine-git-curl:latest
        # install jb and tk then start the argocd-cmp-server
        command:
          - sh
          - -c
          - |
            cd /home/argocd/cmp-server/plugins && \
            curl -Lo jb "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v0.6.0/jb-linux-amd64" && \
            curl -Lo tk "https://github.com/grafana/tanka/releases/download/v0.32.0/tk-linux-amd64" && \
            cp /mnt/cmp-tanka/generate.sh generate.sh && \
            chmod +x jb tk generate.sh && \
            /var/run/argocd/argocd-cmp-server
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: plugin.yaml
            name: cmp-tanka
          - mountPath: /mnt/cmp-tanka
            name: cmp-tanka
          # Shared jsonnet-bundler vendor tree across Tanka apps (same jb deps, different env checkouts).
          - mountPath: /var/jb-vendor
            name: jb-vendor-cache
    volumes:
      - name: jb-vendor-cache
        emptyDir: {}
      - name: cmp-tanka
        configMap:
          name: cmp-tanka
