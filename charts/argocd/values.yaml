argo-cd:
  ## Argo CD configuration
  ## Ref: https://github.com/argoproj/argo-cd
  ##
  # -- Create aggregated roles that extend existing cluster roles to interact with argo-cd resources
  ## Ref: https://kubernetes.io/docs/reference/access-authn-authz/rbac/#aggregated-clusterroles
  createAggregateRoles: false
  # -- Create cluster roles for cluster-wide installation.
  ## Used when you manage applications in the same cluster where Argo CD runs
  createClusterRoles: true
  ## Custom resource configuration
  crds:
    keep: true
    install: false
    # annotations:
    #   prevent-trivial-diff: please
  ## Globally shared configuration
  global:
    # -- Default domain used by all components
    ## Used for ingresses, certificates, SSO, notifications, etc.
    domain: argocd.placeholder.symmatree.com
  ## Argo Configs
  configs:
    # General Argo CD configuration. Any values you put under `.configs.cm` are passed to argocd-cm ConfigMap.
    ## Ref: https://github.com/argoproj/argo-cd/blob/master/docs/operator-manual/argocd-cm.yaml
    cm:
      # -- Create the argocd-cm configmap for [declarative setup]
      create: true
      # -- Enable exec feature in Argo UI
      ## Ref: https://argo-cd.readthedocs.io/en/latest/operator-manual/rbac/#exec-resource
      exec.enabled: true
      # -- Enable local admin user
      ## Ref: https://argo-cd.readthedocs.io/en/latest/faq/#how-to-disable-admin-user
      admin.enabled: true
      # -- Enable Status Badge
      ## Ref: https://argo-cd.readthedocs.io/en/stable/user-guide/status-badge/
      statusbadge.enabled: true
      dex.config: |
        connectors:
          - type: oidc
            id: google
            name: Google
            config:
              issuer: https://accounts.google.com
              # Connector config values starting with "$" reference Kubernetes secrets.
              # Format: $<secret-name>:<key>
              clientID: $google-oauth-secret:OAUTH_CLIENT_ID
              clientSecret: $google-oauth-secret:OAUTH_CLIENT_SECRET
      # Override this whole value just to remove Endpoints (needed for Cilium)
      resource.exclusions: |
        ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
        - apiGroups:
          - ''
          - discovery.k8s.io
          kinds:
          - EndpointSlice
        ### Internal Kubernetes resources excluded reduce the number of watched events
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        ### Intermediate Certificate Request excluded reduce the number of watched events
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
        - apiGroups:
          - cilium.io
          kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
        ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest

    rbac:
      policy.default: role:admin
    # Argo CD configuration parameters
    ## Ref: https://github.com/argoproj/argo-cd/blob/master/docs/operator-manual/argocd-cmd-params-cm.yaml
    params:
      ## Generic parameters
      # -- Open-Telemetry collector address: (e.g. "otel-collector:4317")
      otlp.address: ""
      server.insecure: true
      # Cap concurrent manifest generation and git ls-remote during cold start (see repoServer.livenessProbe).
      reposerver.parallelism.limit: "4"
      reposerver.git.lsremote.parallelism.limit: "4"
      # Tanka CMP MatchRepository / GenerateManifest stalls are observed to last
      # ~60s and consistently hit the default controller -> repo-server gRPC
      # deadline of 60s, leaving the affected apps stuck in Unknown. We have
      # not isolated the root cause; this bumps the deadline so the same calls
      # have headroom to finish and the apps can actually deploy. The deadline
      # is propagated as a context deadline through the repo-server into the
      # CMP-server gRPC call, so this also widens the cmp-server side window.
      controller.repo.server.timeout.seconds: "300"
      # Manifest cache TTL (commit SHA -> generated manifests). Default 24h is too long for
      # tag-based deploys and in-repo Helm when generation inputs change without a new
      # chart version. Separate from timeout.reconciliation (revision/ref cache).
      # https://argo-cd.readthedocs.io/en/stable/operator-manual/high_availability/
      reposerver.repo.cache.expiration: 30m
      # Diagnosing 30-60s MatchRepository / GenerateManifest stalls against the Tanka
      # CMP sidecar. At debug we observe the repo-server log going silent for ~48s
      # between accepting a CMP GenerateManifest and the deadline-driven failure --
      # the silent side is repo-server itself. Bumping to trace to surface whatever
      # code path is being walked during that window.
      reposerver.log.level: trace

  ## Application controller
  controller:
    resources:
      limits:
        memory: 768Mi
    env:
    - name: GOMEMLIMIT
      value: "690MiB"  # ~90% of the 768Mi memory limit above; GOMEMLIMIT uses MiB/GiB units
    ## Application controller metrics configuration
    metrics:
      # -- Deploy metrics service
      enabled: true
      serviceMonitor:
        # -- Enable a prometheus ServiceMonitor
        enabled: true
      rules:
        enabled: false
        # Alerts are now provided by the ArgoCD mixin (see argocd-mixin Application)
  ## Dex
  dex:
    enabled: true
    metrics:
      # -- Deploy metrics service
      enabled: true
      serviceMonitor:
        # -- Enable a prometheus ServiceMonitor
        enabled: true
  ## Server
  server:
    ## Server metrics service configuration
    metrics:
      # -- Deploy metrics service
      enabled: true
      serviceMonitor:
        # -- Enable a prometheus ServiceMonitor
        enabled: true
    # Ingress disabled: oauth2-proxy is the external entry point.
    # argocd-server has no direct external exposure.
    ingress:
      enabled: false
    # Dedicated gRPC ingress for ingress controllers that supports only single backend protocol per Ingress resource
    # Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/ingress/#option-2-multiple-ingress-objects-and-hosts
    ingressGrpc:
      # -- Enable an ingress resource for the Argo CD server for dedicated [gRPC-ingress]
      # Disabled until needed; argocd command line seems to work without this.
      enabled: false
      annotations:
        cert-manager.io/cluster-issuer: real-cert
      ingressClassName: cilium
      hostname: grpc-argocd.placeholder.symmatree.com
      tls: true
  ## Notifications controller
  notifications:
    # -- Enable notifications controller
    enabled: false
    # secret:
    #   create: false
    #   name: argocd-notifications-secret
    # notifiers:
    #   service.slack: |
    #     token: $slack-token
    # subscriptions:
    #   - recipients:
    #       - slack:tiles
    #       - slack:priority
    #     triggers:
    #       - on-sync-status-unknown
    #       - on-health-degraded
    #       - on-sync-failed
    #   - recipients:
    #       - slack:tiles
    #     triggers:
    #       #- on-sync-running
    #       #- on-sync-succeeded
    #       - on-created
    #       - on-deployed
    # triggers:
    #   defaultTriggers: |
    #     - on-sync-status-unknown
    #     - on-health-degraded
    #     - on-sync-failed
    #     - on-created
    #     - on-deployed
    #   trigger.on-deployed: |
    #     - description: Application is synced and healthy. Triggered once per commit.
    #       oncePer: app.status.sync.revision
    #       send:
    #       - app-deployed
    #       when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
    #   trigger.on-health-degraded: |
    #     - description: Application has degraded
    #       send:
    #       - app-health-degraded
    #       when: app.status.health.status == 'Degraded'
    #   trigger.on-sync-failed: |
    #     - description: Application syncing has failed
    #       send:
    #       - app-sync-failed
    #       when: app.status.operationState.phase in ['Error', 'Failed']
    #   trigger.on-sync-running: |
    #     - description: Application is being synced
    #       send:
    #       - app-sync-running
    #       when: app.status.operationState.phase in ['Running']
    #   trigger.on-sync-status-unknown: |
    #     - description: Application status is 'Unknown'
    #       send:
    #       - app-sync-status-unknown
    #       when: app.status.sync.status == 'Unknown'
    #   trigger.on-sync-succeeded: |
    #     - description: Application syncing has succeeded
    #       send:
    #       - app-sync-succeeded
    #       when: app.status.operationState.phase in ['Succeeded']
    #   trigger.on-created: |
    #     - description: Application is created.
    #       send:
    #       - app-created
    #       when: "true"

    # grafana-apiKey:
    #   # For more information: https://argo-cd.readthedocs.io/en/stable/operator-manual/notifications/services/grafana/

    # webhooks-github-token:

  repoServer:
    # Repo-server main container: allow healthz to survive brief load spikes (default timeout 1s is tight).
    livenessProbe:
      timeoutSeconds: 5
      failureThreshold: 3
    ## Repo-server metrics service configuration
    metrics:
      # -- Deploy metrics service
      enabled: true
      serviceMonitor:
        # -- Enable a prometheus ServiceMonitor
        # Needed to graph argocd_git_request_duration_seconds, argocd_repo_pending_request_total,
        # grpc_server_handling_seconds_*, etc. for the repo-server -> CMP path.
        enabled: true
    # Following https://raynix.info/archives/4565
    extraContainers:
      - name: tanka
        # We need git for downloading dependencies with jb.
        image: prontotools/alpine-git-curl:latest
        # install jb and tk then start the argocd-cmp-server
        command:
          - sh
          - -c
          - |
            cd /home/argocd/cmp-server/plugins && \
            curl -Lo jb "https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v0.6.0/jb-linux-amd64" && \
            curl -Lo tk "https://github.com/grafana/tanka/releases/download/v0.32.0/tk-linux-amd64" && \
            cp /mnt/cmp-tanka/generate.sh generate.sh && \
            chmod +x jb tk generate.sh && \
            /var/run/argocd/argocd-cmp-server
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: plugin.yaml
            name: cmp-tanka
          - mountPath: /mnt/cmp-tanka
            name: cmp-tanka
          # Shared jsonnet-bundler vendor tree across Tanka apps (same jb deps, different env checkouts).
          - mountPath: /var/jb-vendor
            name: jb-vendor-cache
    volumes:
      - name: jb-vendor-cache
        emptyDir: {}
      - name: cmp-tanka
        configMap:
          name: cmp-tanka

oauth2-proxy:
  # Pin a current patched image (chart 7.7.0 defaults to the older v7.6.0). This
  # is the internet-facing auth gate, so track upstream security fixes. Bumped for
  # the WAN cutover. 7.6 -> 7.15 uses only long-stable flags/config keys; the
  # provider (google), classic --config file, and --authenticated-emails-file are
  # unaffected by the interim breaking changes (Alpha Config v2, Azure/keycloak
  # provider deprecations, upstream request signatures -- none of which we use).
  image:
    tag: v7.15.3
  # Credentials come from 1Password via the OnePasswordItem in
  # templates/oauth2-proxy-secret.yaml, which creates a Secret named
  # 'argocd-oauth2-proxy'. The vault item's field labels must be exactly
  # 'client-id', 'client-secret', 'cookie-secret' -- those become the Secret keys
  # that the chart's existingSecret path reads.
  #   - client-id / client-secret: from the GCP OAuth2 client 'argocd-oauth-proxy'
  #     (redirect URI https://argocd.{cluster}.symmatree.com/oauth2/callback)
  #   - cookie-secret: openssl rand -base64 32 | head -c 32 | base64
  #
  # existingSecret is required: without it the chart renders its OWN Secret of the
  # same name full of "XXXXXXX" placeholders, which collides with the OnePasswordItem
  # and (Argo self-heal winning the race) sends client_id=XXXXXXX to Google -- the
  # authorize step is rejected and no callback ever returns.
  config:
    existingSecret: argocd-oauth2-proxy
    # Override the chart's default configFile, which sets email_domains = [ "*" ]
    # (allowAll). oauth2-proxy merges --config with CLI args, so dropping the
    # --email-domain arg alone was NOT enough -- the wildcard lived here too and
    # kept letting every Google account in. With no email_domains anywhere, the
    # authenticated-emails-file below is the sole gate. (upstreams here is the
    # chart's required dummy; the real upstream is --upstream in extraArgs.)
    configFile: |-
      upstreams = [ "file:///dev/null" ]
  extraArgs:
    - --provider=google
    # Do NOT set --email-domain: in oauth2-proxy email validation is OR, not AND
    # (valid = domain-matches OR in-emails-file), and --email-domain=* sets allowAll
    # -> every Google account passes and the emails file below is never consulted.
    # The wildcard must also be absent from config.configFile above (chart default).
    - --upstream=http://argocd-server:80
    - --pass-host-header=true
    - --set-xauthrequest=true
    - --silence-ping-logging=true
    - --skip-provider-button=true
    - --reverse-proxy=true
    # Restrict who may set X-Forwarded-* to the in-cluster pod CIDR
    # (cilium ipv4-native-routing-cidr). Without this, --reverse-proxy trusts
    # X-Forwarded-* from 0.0.0.0/0 -- fine when only the ingress could reach us,
    # but this is now internet-facing. The Cilium ingress Envoy SNATs its backend
    # connections into this CIDR (observed proxy source IPs 10.0.145/148/149.x all
    # land here), so trusting it covers every legitimate ingress source while
    # excluding external clients. Node IPs are heterogeneous (10.0.128.x and
    # 10.0.99.x) so the pod CIDR -- not node subnets -- is the reliable boundary.
    - --trusted-proxy-ip=10.0.144.0/20
  # Allowlist: the ONLY emails permitted. The chart writes them to a ConfigMap and
  # passes --authenticated-emails-file automatically. This is the actual restriction --
  # it works precisely because --email-domain is unset (see extraArgs above).
  authenticatedEmailsFile:
    enabled: true
    restricted_access: |
      seth.porter@gmail.com
  ingress:
    enabled: true
    className: cilium
    # Prefix (not the chart's default ImplementationSpecific): under Cilium,
    # ImplementationSpecific + path "/" matches ONLY the exact "/", so /oauth2/callback
    # and the whole Argo CD UI 404 at Envoy before reaching the proxy. Every other
    # ingress in this cluster uses Prefix "/"; match that so all paths route.
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: real-cert
      # Ride the single shared front door (the pinned cilium-ingress LB IP)
      # rather than a dedicated per-ingress LB IP. With no external-dns target
      # override, external-dns publishes this host at that internal ingress IP,
      # so it is reachable and testable on-LAN. The WAN cutover (external-dns
      # target -> lhitw.symmatree.com + the UniFi 443 port-forward) is a
      # separate follow-up PR, so nothing is exposed until that is applied.
      ingress.cilium.io/loadbalancer-mode: shared
      # WAN cutover: publish as a CNAME to the UniFi dynamic-DNS record (WAN IP)
      # instead of the internal ingress IP, so the host resolves for external
      # clients and tracks the dynamic address. Paired with the UniFi 443
      # port-forward (tf/nodes/port-forwards.tf) -- this is the exposure switch.
      external-dns.alpha.kubernetes.io/target: lhitw.symmatree.com
    hosts:
      - argocd.placeholder.symmatree.com
    tls:
      - secretName: argocd-proxy-tls
        hosts:
          - argocd.placeholder.symmatree.com
