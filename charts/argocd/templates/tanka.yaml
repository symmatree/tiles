apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-tanka
  namespace: "{{ .Release.Namespace }}"
data:
  # Note that the ArgoCD parser apparently can't handle multiline YAML formats.
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: tanka
    spec:
      init:
        # Keep ./vendor as a real directory in the CMP checkout. jsonnet-bundler v0.6.0 writes through a vendor
        # symlink during extraction, then removes the symlink before creating legacy-import symlinks, failing with
        # "symlink ... vendor/<package>: no such file or directory".
        # `flock` serializes copy-in, `jb install`, and copy-back against a shared cache keyed by the lockfile hash:
        # this avoids concurrent writes and avoids reusing stale package trees after jsonnetfile.lock.json changes.
        # busybox flock takes `FILE PROG ARGS` (exclusive + blocking by default), and the upstream alpine-git-curl
        # image already provides /usr/bin/flock as a busybox applet. `sh -xc` keeps step-by-step traces in stderr.
        command: ["sh", "-xc", "flock /var/jb-vendor/.lock sh -xec 'hash=\"$(sha256sum jsonnetfile.lock.json | cut -d\" \" -f1)\"; cache_dir=\"/var/jb-vendor/${hash}\"; rm -rf vendor; mkdir -p vendor \"${cache_dir}\"; cp -a \"${cache_dir}/.\" vendor/; /home/argocd/cmp-server/plugins/jb install; cp -a vendor/. \"${cache_dir}/\"'"]
      parameters:
        static:
          - name: cluster_name
            string: "placeholder-cluster-name"
          - name: vault_name
            string: "placeholder-vault-name"
          - name: project_id
            string: "placeholder-project-id"
          - name: app_settings
            collectionType: map
            map: {}

      generate:
        command:
          - /home/argocd/cmp-server/plugins/generate.sh
      discover:
        fileName: "./environments/*/main.jsonnet"
  generate.sh: |
    #!/bin/sh
    set -euo pipefail
    # Trace each command to stderr so we can see per-step timing in the tanka container log
    # (debugging MatchRepository / GenerateManifest stalls). Remove once resolved.
    set -x
    if [ -z "${ARGOCD_ENV_TK_ENV:-}" ]; then
      echo "ARGOCD_ENV_TK_ENV is not set" >&2
      exit 1
    fi
    if [ -z "${ARGOCD_APP_PARAMETERS:-}" ]; then
      echo "ARGOCD_APP_PARAMETERS is not set" >&2
      exit 1
    fi
    echo "Generating tanka environment ${ARGOCD_ENV_TK_ENV}\n  with parameters:\n\n${ARGOCD_APP_PARAMETERS}" >&2
    /home/argocd/cmp-server/plugins/tk show \
      "environments/${ARGOCD_ENV_TK_ENV}" \
      --dangerous-allow-redirect \
      --ext-str ARGOCD_APP_PARAMETERS="${ARGOCD_APP_PARAMETERS}"
