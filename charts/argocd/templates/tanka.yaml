apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-tanka
  namespace: "{{ .Release.Namespace }}"
data:
  # Note that the ArgoCD parser apparently can't handle multiline YAML formats.
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: tanka
    spec:
      init:
        # Symlink ./vendor to a shared emptyDir so jb populates one tree for all Tanka apps; tk still sees ./vendor.
        # `flock` serializes `jb install` against the shared cache: jsonnet-bundler is not safe for concurrent
        # writes to the same vendor dir and panics with "rename ... file exists" when two parallel CMP calls race
        # on the same module download. The lock file lives in the shared cache itself so it persists for pod
        # lifetime; busybox flock takes `FILE PROG ARGS` (exclusive + blocking by default), and the upstream
        # alpine-git-curl image already provides /usr/bin/flock as a busybox applet.
        # `sh -xc` keeps step-by-step traces in the cmp-server stderr.
        command: ["sh", "-xc", "ln -sfn /var/jb-vendor vendor && flock /var/jb-vendor/.lock /home/argocd/cmp-server/plugins/jb install"]
      parameters:
        static:
          - name: cluster_name
            string: "placeholder-cluster-name"
          - name: vault_name
            string: "placeholder-vault-name"
          - name: project_id
            string: "placeholder-project-id"
          - name: app_settings
            collectionType: map
            map: {}

      generate:
        command:
          - /home/argocd/cmp-server/plugins/generate.sh
      discover:
        fileName: "./environments/*/main.jsonnet"
  generate.sh: |
    #!/bin/sh
    set -euo pipefail
    # Trace each command to stderr so we can see per-step timing in the tanka container log
    # (debugging MatchRepository / GenerateManifest stalls). Remove once resolved.
    set -x
    if [ -z "${ARGOCD_ENV_TK_ENV:-}" ]; then
      echo "ARGOCD_ENV_TK_ENV is not set" >&2
      exit 1
    fi
    if [ -z "${ARGOCD_APP_PARAMETERS:-}" ]; then
      echo "ARGOCD_APP_PARAMETERS is not set" >&2
      exit 1
    fi
    echo "Generating tanka environment ${ARGOCD_ENV_TK_ENV}\n  with parameters:\n\n${ARGOCD_APP_PARAMETERS}" >&2
    /home/argocd/cmp-server/plugins/tk show \
      "environments/${ARGOCD_ENV_TK_ENV}" \
      --dangerous-allow-redirect \
      --ext-str ARGOCD_APP_PARAMETERS="${ARGOCD_APP_PARAMETERS}"
