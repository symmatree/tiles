baseDomain: local.symmatree.com
clusterIssuer: real-cert
namespace: static-certs

# Push TLS material from selected Certificate secrets to Synology DSM (acme.sh synology_dsm deploy hook).
# DSM login Secret is synced from 1Password via OnePasswordItem (same pattern as laserjet password).
synologyDsmSync:
  enabled: false
  schedule: "0 7 * * *"
  image: alpine:3.20
  synology:
    scheme: https
    hostname: raconteur.ad.local.symmatree.com
    port: "5001"
  loginOnePasswordItem:
    name: raconteur-login
    itemPath: vaults/tiles-secrets/items/raconteur-login
  loginSecretKeys:
    usernameKey: username
    passwordKey: password
  certificates:
    - fqdn: raconteur.ad.local.symmatree.com
      secretName: raconteur-cert
      volumeMountPath: raconteur
    - fqdn: cam.local.symmatree.com
      secretName: cam-cert
      volumeMountPath: cam
    - fqdn: photos.local.symmatree.com
      secretName: photos-cert
      volumeMountPath: photos

# Push homeassistant-cert to HA Yellow over SSH (acme.sh ssh deploy hook).
# Deploy key Secret is synced from 1Password. Paths match ha-config configuration.yaml.
homeassistantSshSync:
  enabled: false
  schedule: "15 7 * * *"
  image: alpine:3.20
  ssh:
    user: root
    host: 10.0.99.9
    port: "22"
    remotePaths:
      fullchain: /config/ssl/homeassistant-cert.crt
      privkey: /config/ssl/homeassistant-cert.key
    remoteCmd: ha core restart
  sshKeyOnePasswordItem:
    name: homeassistant-cert-ssh
    itemPath: vaults/tiles-secrets/items/homeassistant-cert-ssh
  sshKeySecretKey: "private-key"
  certificates:
    - fqdn: homeassistant.local.symmatree.com
      secretName: homeassistant-cert
      volumeMountPath: homeassistant

staticCerts:
  - name: raconteur
    subdomain: .ad
  - name: morpheus
  - name: homeassistant
  # - name: laserjet -- requires special care.
  - name: hubitat
  # cam is hosted on raconteur.
  - name: cam
  - name: photos
