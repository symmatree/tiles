apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jupyterhub-cert
  namespace: "{{ .Release.Namespace }}"
spec:
  dnsNames:
    - "notebook.{{ .Values.cluster_name }}.symmatree.com"
  secretName: jupyterhub-tls
  issuerRef:
    name: real-cert
    kind: ClusterIssuer
    group: cert-manager.io
