# Passed by jupyterhub-application.yaml valuesObject.
cluster_name: placeholder
vault_name: placeholder
nfs_server: placeholder
cluster_nfs_path: placeholder
datasets_nfs_path: placeholder
hostname: notebook.placeholder.symmatree.com
sshHostname: notebook-ssh.placeholder.symmatree.com

jupyterhub:
  hub:
    # Placeholder values are for stable rendered.yaml only. At runtime,
    # hub-credentials (OnePasswordItem from Terraform-generated 1Password
    # items) supplies the real cookie_secret and CryptKeeper.keys via
    # existingSecret; get_secret_value() checks existing-secret first.
    # auth_token uses the same placeholder because it goes via the
    # CONFIGPROXY_AUTH_TOKEN env var (chart-managed Secret only, existingSecret
    # is not checked). Override in values-{cluster}.yaml or via Terraform.
    existingSecret: hub-credentials
    cookieSecret: "placeholder-for-rendered-yaml"
    networkPolicy:
      enabled: false
    # The hub sqlite DB uses a reap-able dynamic NFS PVC (cluster-nfs) instead of
    # the default local-path storageClass. Hub state is not meant to persist
    # across cluster rebuilds; we only need the volume to be node-independent so
    # the hub pod can reschedule to any host. local-path pins the PV to one node's
    # disk by hostname affinity, which stranded the hub (Pending) when that node
    # was renamed/lost after a power event. NFS has no node affinity, and a single
    # hub writer makes sqlite-on-NFS safe.
    db:
      pvc:
        storageClassName: cluster-nfs
    extraEnv:
      OAUTH_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_ID
      OAUTH_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_SECRET
    config:
      JupyterHub:
        authenticator_class: google
        load_roles:
          - name: admin
            users:
              - seth.porter@gmail.com
      ConfigurableHTTPProxy:
        auth_token: "placeholder-for-rendered-yaml"
      CryptKeeper:
        keys:
          - "placeholder-for-rendered-yaml"
      KubeSpawner:
        privileged: true
        # Stable label on every singleuser pod; SSH LoadBalancer selects on this
        # instead of the hub.jupyter.org/username hash which is hard to predict.
        extra_labels:
          tiles.symmatree.com/user: seth
        container_security_context:
          capabilities:
            add:
              - SYS_ADMIN
              - DAC_READ_SEARCH
        # 4GB image; cold pull can take 15+ minutes. 1800s covers worst case.
        start_timeout: 1800
      OAuthenticator:
        allow_all: true
    extraConfig:
      oauthConfig.py: |
        import os
        c.OAuthenticator.client_id = os.environ["OAUTH_CLIENT_ID"]
        c.OAuthenticator.client_secret = os.environ["OAUTH_CLIENT_SECRET"]

  # Never cull: the whole point is an always-on SSH target.
  cull:
    enabled: false

  singleuser:
    uid: 0
    extraEnv:
      GRANT_SUDO:
        value: "yes"
    allowPrivilegeEscalation: true
    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: false
    cmd: null
    image:
      name: ghcr.io/symmatree/tiles/datascience-notebook-ssh
      # Pin an immutable per-build tag (the build workflow's docker/metadata
      # `type=sha` produces sha-<short>) and pull only when absent. The image is
      # ~4GB; `edge` + Always re-pulled it on every pod spawn. A unique tag means
      # IfNotPresent still fetches genuinely new builds (the tag changes) without
      # re-pulling an unchanged image. Roll forward by bumping this to the newer
      # sha-<...> tag from the build-datascience-notebook-ssh run.
      tag: sha-a5d1c0d
      pullPolicy: IfNotPresent
    storage:
      # Static shared NFS volume (templates/home-nfs.yaml) instead of a dynamic
      # local-path PVC: each user gets a persistent, named directory
      # …/jupyterhub-home/<username> on the NAS, with no node affinity so the
      # pod is free to honor the nodeSelector (e.g. lancer) rather than being
      # pinned to whichever node held the local disk.
      type: static
      static:
        pvcName: jupyterhub-home
        subPath: "{username}"
      extraVolumeMounts:
        - name: keys
          mountPath: /mnt/keys
        # Shared "datasets" NFS share (templates/datasets-nfs.yaml), read-write,
        # under the notebook root so it shows up in the Jupyter file browser.
        - name: datasets
          mountPath: /home/jovyan/datasets
      extraVolumes:
        - name: keys
          secret:
            secretName: ssh-secret
            items:
              - key: public-key
                path: authorized_keys
        - name: datasets
          persistentVolumeClaim:
            claimName: jupyterhub-datasets

  scheduling:
    userScheduler:
      replicas: 1

  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  proxy:
    chp:
      networkPolicy:
        enabled: false
    https:
      enabled: true
      type: secret
      secret:
        name: jupyterhub-tls
        key: tls.key
        crt: tls.crt
