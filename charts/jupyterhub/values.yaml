# Values for templates/
cluster_name: placeholder-cluster-name
vault_name: placeholder-vault-name

# The JupyterHub username slug for the SSH service selector.
# This is generated by JupyterHub's safe_slug function from the OAuth identity.
# For seth.porter@gmail.com this is "seth-porter-gmail-com---39d0c2f0".
sshUser: seth-porter-gmail-com---39d0c2f0

# https://raw.githubusercontent.com/jupyterhub/zero-to-jupyterhub-k8s/refs/tags/4.1.6/jupyterhub/values.yaml
global:
  safeToShowValues: true
jupyterhub:
  hub:
    networkPolicy:
      enabled: false
    extraEnv:
      OAUTH_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_ID
      OAUTH_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_SECRET
    config:
      JupyterHub:
        authenticator_class: google
        load_roles:
          - name: admin
            users:
              - seth.porter@gmail.com
      KubeSpawner:
        privileged: true
        container_security_context:
          capabilities:
            add:
              - SYS_ADMIN
              - DAC_READ_SEARCH
      OAuthenticator:
        allow_all: true
        oauth_callback_url: placeholder-oauth-callback-url
    extraConfig:
      oauthConfig.py: |
        import os
        c.OAuthenticator.client_id = os.environ["OAUTH_CLIENT_ID"]
        c.OAuthenticator.client_secret = os.environ["OAUTH_CLIENT_SECRET"]
  cull:
    enabled: false
  singleuser:
    # https://jupyter-docker-stacks.readthedocs.io/en/latest/using/recipes.html#using-sudo-within-a-container
    uid: 0
    extraEnv:
      GRANT_SUDO:
        value: "yes"
    allowPrivilegeEscalation: true
    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: false
    cmd: null
    image:
      name: ghcr.io/symmatree/internal/datascience-notebook-ssh
      tag: 2025-07-12
      pullSecrets:
        - name: ghcr-pull-secret
      pullPolicy: Always
    storage:
      capacity: 100Gi
      extraVolumeMounts:
        - name: keys
          mountPath: /mnt/keys
      extraVolumes:
        - name: keys
          secret:
            secretName: ssh-secret
            items:
              - key: public-key
                path: authorized_keys
  scheduling:
    userScheduler:
      replicas: 1
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false
  proxy:
    chp:
      networkPolicy:
        enabled: false
    service:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: placeholder-notebook-hostname
    https:
      enabled: true
      type: secret
      secret:
        name: jupyterhub-tls
        key: tls.key
        crt: tls.crt
      hosts:
        - placeholder-notebook-hostname
