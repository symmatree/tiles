# Passed by jupyterhub-application.yaml valuesObject.
cluster_name: placeholder
vault_name: placeholder
nfs_server: placeholder
cluster_nfs_path: placeholder
datasets_nfs_path: placeholder
hostname: notebook.placeholder.symmatree.com
sshHostname: notebook-ssh.placeholder.symmatree.com

jupyterhub:
  hub:
    # Placeholder values are for stable rendered.yaml only. At runtime,
    # hub-credentials (OnePasswordItem from Terraform-generated 1Password
    # items) supplies the real cookie_secret and CryptKeeper.keys via
    # existingSecret; get_secret_value() checks existing-secret first.
    # auth_token uses the same placeholder because it goes via the
    # CONFIGPROXY_AUTH_TOKEN env var (chart-managed Secret only, existingSecret
    # is not checked). Override in values-{cluster}.yaml or via Terraform.
    existingSecret: hub-credentials
    cookieSecret: "placeholder-for-rendered-yaml"
    networkPolicy:
      enabled: false
    # The hub sqlite DB uses a reap-able dynamic NFS PVC (cluster-nfs) instead of
    # the default local-path storageClass. Hub state is not meant to persist
    # across cluster rebuilds; we only need the volume to be node-independent so
    # the hub pod can reschedule to any host. local-path pins the PV to one node's
    # disk by hostname affinity, which stranded the hub (Pending) when that node
    # was renamed/lost after a power event. NFS has no node affinity, and a single
    # hub writer makes sqlite-on-NFS safe.
    db:
      pvc:
        storageClassName: cluster-nfs
    extraEnv:
      OAUTH_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_ID
      OAUTH_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: google-oauth-secret
            key: OAUTH_CLIENT_SECRET
    config:
      JupyterHub:
        authenticator_class: google
        load_roles:
          - name: admin
            users:
              - seth.porter@gmail.com
      ConfigurableHTTPProxy:
        auth_token: "placeholder-for-rendered-yaml"
      CryptKeeper:
        keys:
          - "placeholder-for-rendered-yaml"
      KubeSpawner:
        privileged: true
        # Stable label on every singleuser pod; SSH LoadBalancer selects on this
        # instead of the hub.jupyter.org/username hash which is hard to predict.
        extra_labels:
          tiles.symmatree.com/user: seth
        container_security_context:
          capabilities:
            add:
              - SYS_ADMIN
              - DAC_READ_SEARCH
        # 4GB image; cold pull can take 15+ minutes. 1800s covers worst case.
        start_timeout: 1800
      OAuthenticator:
        allow_all: true
    extraConfig:
      oauthConfig.py: |
        import os
        c.OAuthenticator.client_id = os.environ["OAUTH_CLIENT_ID"]
        c.OAuthenticator.client_secret = os.environ["OAUTH_CLIENT_SECRET"]

  # Never cull: the whole point is an always-on SSH target.
  cull:
    enabled: false

  singleuser:
    uid: 0
    extraEnv:
      GRANT_SUDO:
        value: "yes"
    allowPrivilegeEscalation: true
    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: false
    cmd: null
    image:
      name: ghcr.io/symmatree/tiles/datascience-notebook-ssh
      # Pin an immutable per-build tag (the build workflow's docker/metadata
      # `type=sha` produces sha-<short>) and pull only when absent. The image is
      # ~4GB; `edge` + Always re-pulled it on every pod spawn. A unique tag means
      # IfNotPresent still fetches genuinely new builds (the tag changes) without
      # re-pulling an unchanged image. Roll forward by bumping this to the newer
      # sha-<...> tag from the build-datascience-notebook-ssh run.
      tag: sha-4169b5c
      pullPolicy: IfNotPresent
    storage:
      # Static shared NFS volume (templates/home-nfs.yaml) instead of a dynamic
      # local-path PVC: each user gets a persistent, named directory
      # …/jupyterhub-home/<username> on the NAS, with no node affinity so the
      # pod is free to honor the nodeSelector (e.g. lancer) rather than being
      # pinned to whichever node held the local disk.
      type: static
      static:
        pvcName: jupyterhub-home
        subPath: "{username}"
      extraVolumeMounts:
        - name: keys
          mountPath: /mnt/keys
        # Shared "datasets" NFS share (templates/datasets-nfs.yaml), read-write,
        # under the notebook root so it shows up in the Jupyter file browser.
        - name: datasets
          mountPath: /home/jovyan/datasets
      extraVolumes:
        - name: keys
          secret:
            secretName: ssh-secret
            items:
              - key: public-key
                path: authorized_keys
        - name: datasets
          persistentVolumeClaim:
            claimName: jupyterhub-datasets

  scheduling:
    userScheduler:
      replicas: 1

  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  proxy:
    chp:
      networkPolicy:
        enabled: false
    # proxy-public is now internal-only: the oauth2-proxy sub-chart is the entry
    # point and terminates TLS at the shared Cilium front door (cert-manager
    # real-cert). So the hub's own LoadBalancer + self-signed TLS are dropped.
    service:
      type: ClusterIP
    https:
      enabled: false

# oauth2-proxy perimeter gate in front of JupyterHub -- the hardened ArgoCD
# pattern (refs #593-#604). Google login + email allowlist is the real gate;
# the hub's own Google auth (allow_all) sits behind it as a separate layer.
# WAN-exposed: the ingress rides the shared Cilium front door and publishes via
# external-dns target -> lhitw (the UniFi 443 port-forward), same as ArgoCD. The
# security boundary (allowlist as sole gate, no email_domains, trusted-proxy-ip)
# is identical to the already-WAN-live ArgoCD gate; a broken proxy fails closed.
oauth2-proxy:
  # Chart 7.7.0 defaults to the older v7.6.0; pin the current patched release
  # since this becomes internet-facing (see ArgoCD #602 image-bump rationale).
  image:
    tag: v7.15.3
  # Credentials from 1Password via templates/oauth2-proxy-secret.yaml
  # (OnePasswordItem 'jupyterhub-oauth2-proxy'). Vault-item field labels must be
  # exactly client-id / client-secret / cookie-secret (the chart's existingSecret
  # keys). client-id/secret: REUSE the hub's existing Google client (behind
  # google-oauth-secret) -- add redirect URI
  # https://notebook.{cluster}.symmatree.com/oauth2/callback to it. Same
  # client-id/secret as the hub, but a NEW item here, plus cookie-secret =
  # openssl rand -base64 32 | tr -- '+/' '-_' (URL-safe: oauth2-proxy decodes the
  # secret with base64.RawURLEncoding, so standard-base64 '+'/'/' fails to decode
  # and it falls back to the raw 44-byte string -> not a valid AES key length ->
  # startup error. URL-safe base64 of 32 bytes decodes cleanly to a 32-byte key).
  # Sharing the client makes the
  # hub's own OAuth a silent redirect (single interactive login); collapsing the
  # second layer entirely is a follow-up (header authenticator, see #605).
  # existingSecret is required or
  # the chart renders its own XXXXXXX placeholder secret and collides (ArgoCD #600).
  config:
    existingSecret: jupyterhub-oauth2-proxy
    # Drop the chart's default email_domains = [ "*" ] (allowAll) -- with it, the
    # allowlist is never consulted (ArgoCD #603). Only the dummy upstream remains;
    # the real upstream is --upstream in extraArgs.
    configFile: |-
      upstreams = [ "file:///dev/null" ]
  extraArgs:
    - --provider=google
    # No --email-domain: validation is OR, and --email-domain=* is allowAll
    # (ArgoCD #602). The authenticated-emails-file is the sole gate.
    - --upstream=http://proxy-public:80
    - --pass-host-header=true
    - --set-xauthrequest=true
    - --silence-ping-logging=true
    - --skip-provider-button=true
    - --reverse-proxy=true
    # Trust X-Forwarded-* only from the in-cluster pod CIDR (the Cilium ingress
    # Envoy SNATs into it), not 0.0.0.0/0 (ArgoCD #604).
    - --trusted-proxy-ip=10.0.144.0/20
  # The ONLY emails allowed through the perimeter.
  authenticatedEmailsFile:
    enabled: true
    restricted_access: |
      seth.porter@gmail.com
  ingress:
    enabled: true
    className: cilium
    # Prefix, not the chart default ImplementationSpecific, which under Cilium
    # matches only the exact "/" and 404s /oauth2/callback + the app (ArgoCD #601).
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: real-cert
      # Ride the shared cilium-ingress front door (pinned LB IP)...
      ingress.cilium.io/loadbalancer-mode: shared
      # ...and publish as a CNAME to the UniFi dynamic-DNS record (WAN IP) instead
      # of the internal ingress IP, so the host resolves for external clients and
      # tracks the dynamic address. Paired with the UniFi 443 port-forward
      # (tf/nodes/port-forwards.tf) -- this is the exposure switch, same as ArgoCD.
      external-dns.alpha.kubernetes.io/target: lhitw.symmatree.com
    hosts:
      - notebook.placeholder.symmatree.com
    tls:
      - secretName: jupyterhub-oauth2-proxy-tls
        hosts:
          - notebook.placeholder.symmatree.com
