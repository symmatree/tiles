# Minimal resource footprint for tiles-test (RAM-constrained single node).
jupyterhub:
  hub:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
  proxy:
    chp:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
  scheduling:
    userScheduler:
      replicas: 0
  singleuser:
    # storage is now the shared static NFS home (see base values.yaml); capacity
    # no longer applies since we don't provision a per-user dynamic PVC.
    memory:
      guarantee: 512M
      limit: 1G
