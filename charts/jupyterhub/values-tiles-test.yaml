# Minimal resource footprint for tiles-test (RAM-constrained single node).
jupyterhub:
  hub:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
  proxy:
    chp:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
  scheduling:
    userScheduler:
      replicas: 0
  singleuser:
    storage:
      capacity: 10Gi
    memory:
      guarantee: 512M
      limit: 1G
