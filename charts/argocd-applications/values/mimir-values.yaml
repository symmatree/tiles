# Static Mimir values (mimir-distributed chart). Per-cluster resources in mimir-<cluster_name>-values.yaml.
# Templated keys (gateway ingress, NFS PV, datasource org header) stay in mimir-application.yaml valuesObject.

global:
  podLabels: {}
  extraVolumes:
    - name: mimir-shared-storage
      persistentVolumeClaim:
        claimName: mimir-mimir-data
  extraVolumeMounts:
    - name: mimir-shared-storage
      mountPath: /mnt/mimir-nfs

extraObjects:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: mimir-mimir-data
      namespace: "mimir"
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 100Gi
      volumeName: mimir-mimir-data
      storageClassName: ""

mimir:
  structuredConfig:
    multitenancy_enabled: true
    tenant_federation:
      enabled: true
    limits:
      ruler_max_rules_per_rule_group: 100
      # default is 150000 per user, we are currently all in one
      max_global_series_per_user: 500000
      max_fetched_chunks_per_query: 4000000
    common:
      storage:
        backend: filesystem
        # Set to read-only root path as safety check - will fail if any component
        # tries to use common.storage instead of explicit storage configs
        filesystem:
          dir: /
    # Shared storage - mounted at /mnt/mimir-nfs via global extraVolumes
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/blocks
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/ruler
    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/alertmanager

alertmanager:
  zoneAwareReplication:
    enabled: false
  statefulSet:
    enabled: true
  terminationGracePeriodSeconds: 60
  extraContainers:
    - name: alert-forward
      imagePullPolicy: Always
      image: "ghcr.io/symmatree/tiles/mimir-webhook:main"
      ports:
        - name: webhook
          containerPort: 3000
          protocol: TCP
      env:
        - name: APPRISE_URL
          value: http://apprise.apprise.svc:8000/notify/
        - name: APPRISE_KEY
          value: apprise

compactor:
  terminationGracePeriodSeconds: 60

ingester:
  terminationGracePeriodSeconds: 60
  replicas: 2
  zoneAwareReplication:
    enabled: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: ingester
                app.kubernetes.io/name: mimir
                app.kubernetes.io/instance: mimir
            topologyKey: kubernetes.io/hostname
      requiredDuringSchedulingIgnoredDuringExecution: []

kafka:
  extraEnv:
    - name: KAFKA_OPTS
      value: "-Dkafka.logs.dir=/tmp/kafka-logs/"

chunks-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 512

index-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

metadata-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

results-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

minio:
  enabled: false

overrides_exporter:
  replicas: 1

querier:
  replicas: 1
  terminationGracePeriodSeconds: 60

query_frontend:
  replicas: 1
  terminationGracePeriodSeconds: 60

ruler:
  replicas: 1
  terminationGracePeriodSeconds: 60

store_gateway:
  zoneAwareReplication:
    enabled: false
