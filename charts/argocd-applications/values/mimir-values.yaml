# Static Mimir values (mimir-distributed chart). Per-cluster resources in mimir-<cluster_name>-values.yaml.
# Templated keys (gateway ingress, extraObjects, datasource org header) in mimir-application.yaml valuesObject.

global:
  podLabels: {}
  extraVolumes:
    - name: mimir-shared-storage
      persistentVolumeClaim:
        claimName: mimir-mimir-data
  extraVolumeMounts:
    - name: mimir-shared-storage
      mountPath: /mnt/mimir-nfs

mimir:
  structuredConfig:
    multitenancy_enabled: true
    tenant_federation:
      enabled: true
    limits:
      ruler_max_rules_per_rule_group: 100
      # default is 150000 per user, we are currently all in one
      max_global_series_per_user: 500000
      max_fetched_chunks_per_query: 4000000
      # Enable the on-demand cardinality API (/prometheus/api/v1/cardinality/*),
      # which powers Grafana Explore's "Analyse cardinality". Default is false.
      # See docs/mimir.md.
      cardinality_analysis_enabled: true
    common:
      storage:
        backend: filesystem
        # Set to read-only root path as safety check - will fail if any component
        # tries to use common.storage instead of explicit storage configs
        filesystem:
          dir: /
    # Shared storage - mounted at /mnt/mimir-nfs via global extraVolumes
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/blocks
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/ruler
    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /mnt/mimir-nfs/alertmanager

# Self-monitoring: emit a ServiceMonitor per Mimir component so the cluster's
# Alloy (k8s-monitoring) stack scrapes cortex_* into the k8s tenant. Without
# this, Mimir's own metrics are exposed but scraped by nothing, so we can't see
# per-tenant series counts, cardinality, or ingest/query load. See docs/mimir.md.
metaMonitoring:
  serviceMonitor:
    enabled: true
    # Let the Alloy pipeline own the `cluster` label; null stops Mimir from
    # stamping its own (which would default to the release name "mimir").
    clusterLabel: null
  # Deploy the chart's vendored Mimir mixin: dashboards + recording rules +
  # alerts. Recording rules (cluster_job:cortex_*) feed the dashboards; Alloy's
  # mimir.rules.kubernetes syncs the generated PrometheusRule into the ruler
  # (tenant tiles). Job matchers are microservices-flavor and match our live
  # mimir/<component> labels. See docs/mimir.md.
  dashboards:
    enabled: true
  prometheusRule:
    enabled: true
    mimirRules: true
    mimirAlerts: true

alertmanager:
  resources:
    requests:
      cpu: 10m
      memory: 85Mi
  zoneAwareReplication:
    enabled: false
  statefulSet:
    enabled: true
  terminationGracePeriodSeconds: 60
  extraContainers:
    - name: alert-forward
      imagePullPolicy: Always
      image: "ghcr.io/symmatree/tiles/mimir-webhook:main"
      ports:
        - name: webhook
          containerPort: 3000
          protocol: TCP
      env:
        - name: APPRISE_URL
          value: http://apprise.apprise.svc:8000/notify/
        - name: APPRISE_KEY
          value: apprise

compactor:
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      memory: 50Mi

ingester:
  terminationGracePeriodSeconds: 60
  replicas: 2
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: ingester
                app.kubernetes.io/name: mimir
                app.kubernetes.io/instance: mimir
            topologyKey: kubernetes.io/hostname
      requiredDuringSchedulingIgnoredDuringExecution: []

kafka:
  extraEnv:
    - name: KAFKA_OPTS
      value: "-Dkafka.logs.dir=/tmp/kafka-logs/"

chunks-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 512

index-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

metadata-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

results-cache:
  enabled: false
  replicas: 1
  allocatedMemory: 128

minio:
  enabled: false

overrides_exporter:
  replicas: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 40Mi

querier:
  replicas: 1
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 50m

query_frontend:
  replicas: 1
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 50m

ruler:
  replicas: 1
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 100m

store_gateway:
  zoneAwareReplication:
    enabled: false

distributor:
  resources:
    requests:
      cpu: 50m
      memory: 80Mi

query_scheduler:
  resources:
    requests:
      cpu: 50m
      memory: 40Mi
