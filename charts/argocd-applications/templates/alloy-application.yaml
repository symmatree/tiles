apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
spec:
  project: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      targetRevision: "3.7.1"
      chart: k8s-monitoring
      helm:
        valueFiles:
          - $values/charts/argocd-applications/values/alloy-values.yaml
          - $values/charts/argocd-applications/values/alloy-{{ required ".Values.cluster_name is required" .Values.cluster_name }}-values.yaml
        valuesObject:
          vault_name: '{{ required ".Values.vault_name is required" .Values.vault_name }}'
          cluster_name: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
          cluster:
            name: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
          destinations:
            - name: localMimir
              type: prometheus
              url: http://mimir-gateway.mimir.svc/api/v1/push
              tenantId: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
              secret:
                create: false
                embed: true
            - name: localLoki
              type: loki
              url: http://loki.loki.svc:3100/loki/api/v1/push
              tenantId: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
              secret:
                create: false
                embed: true
          extraObjects:
            # Per-tenant Alertmanager routing, pushed to the Mimir alertmanager by
            # mimir.alerts.kubernetes below. Labelled by tenant so each tenant's
            # routing is its own git object. With strategy=None this route is a
            # tenant-wide catch-all -> the in-pod alert-forward sidecar -> Apprise.
            # route.receiver must be a REAL receiver here (not "null"), or alerts
            # fall through the merged config and get dropped. Issue #635.
            - apiVersion: monitoring.coreos.com/v1alpha1
              kind: AlertmanagerConfig
              metadata:
                name: apprise-catchall
                namespace: "alloy"
                labels:
                  mimir_tenant: '{{ required ".Values.cluster_name is required" .Values.cluster_name }}'
              spec:
                route:
                  receiver: apprise
                receivers:
                  - name: apprise
                    webhookConfigs:
                      # alert-forward sidecar shares the mimir-alertmanager pod,
                      # so localhost:3000; it forwards to apprise /notify/apprise.
                      - url: http://localhost:3000?template=alertmanager&key=apprise
                        sendResolved: true
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: hubitat-http
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - http://hubitat.local.symmatree.com
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: raconteur-syno-ui
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - https://raconteur.ad.local.symmatree.com:5001/
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: morpheus-ui
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - https://morpheus.local.symmatree.com/
            - apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: otlp-ingress
                namespace: "alloy"
                annotations:
                  cert-manager.io/cluster-issuer: real-cert
                  external-dns.alpha.kubernetes.io/hostname: 'otlp.{{ required ".Values.cluster_name is required" .Values.cluster_name }}.symmatree.com'
              spec:
                ingressClassName: cilium
                tls:
                  - secretName: otlp-tls
                    hosts:
                      - 'otlp.{{ required ".Values.cluster_name is required" .Values.cluster_name }}.symmatree.com'
                rules:
                  - host: 'otlp.{{ required ".Values.cluster_name is required" .Values.cluster_name }}.symmatree.com'
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: alloy-alloy-receiver
                              port:
                                number: 4318
          alloy-singleton:
            alloy:
              # mimir.alerts.kubernetes is an experimental Alloy component.
              stabilityLevel: experimental
            extraConfig: |-
              mimir.rules.kubernetes "default" {
                address = "http://mimir-gateway.mimir.svc"
                tenant_id = "{{ required ".Values.cluster_name is required" .Values.cluster_name }}"
              }
              // Push per-tenant Alertmanager routing to the Mimir alertmanager. This
              // component has no tenant_id arg, so the tenant is the X-Scope-OrgID
              // header. global_config is only a null default -- the real routing lives
              // in per-tenant AlertmanagerConfig CRs (label mimir_tenant=<cluster>),
              // merged as a tenant-wide catch-all via strategy=None.
              mimir.alerts.kubernetes "default" {
                address       = "http://mimir-gateway.mimir.svc"
                global_config = "global:\n  resolve_timeout: 5m\nroute:\n  receiver: \"null\"\nreceivers:\n- name: \"null\"\n"
                http_headers  = {
                  "X-Scope-OrgID" = ["{{ required ".Values.cluster_name is required" .Values.cluster_name }}"],
                }
                alertmanagerconfig_selector {
                  match_labels = {
                    mimir_tenant = "{{ required ".Values.cluster_name is required" .Values.cluster_name }}",
                  }
                }
                alertmanagerconfig_namespace_selector {
                  match_labels = {
                    "kubernetes.io/metadata.name" = "alloy",
                  }
                }
                alertmanagerconfig_matcher {
                  strategy = "None"
                }
              }
    - repoURL: https://github.com/symmatree/tiles.git
      targetRevision: '{{ required ".Values.targetRevision is required" .Values.targetRevision }}'
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        trust-bundle: enabled
