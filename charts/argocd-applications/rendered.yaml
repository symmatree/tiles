# Source: argocd-applications/templates/alloy-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
spec:
  project: 'placeholder'
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      targetRevision: "3.7.1"
      chart: k8s-monitoring
      helm:
        valueFiles:
          - $values/charts/argocd-applications/values/alloy-values.yaml
          - $values/charts/argocd-applications/values/alloy-placeholder-values.yaml
        valuesObject:
          vault_name: 'placeholder'
          cluster_name: 'placeholder'
          cluster:
            name: 'placeholder'
          destinations:
            - name: localMimir
              type: prometheus
              url: http://mimir-gateway.mimir.svc/api/v1/push
              tenantId: 'placeholder'
              secret:
                create: false
                embed: true
            - name: localLoki
              type: loki
              url: http://loki.loki.svc:3100/loki/api/v1/push
              tenantId: 'placeholder'
              secret:
                create: false
                embed: true
          extraObjects:
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: hubitat-http
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - http://hubitat.local.symmatree.com
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: raconteur-syno-ui
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - https://raconteur.ad.local.symmatree.com:5001/
            - apiVersion: monitoring.coreos.com/v1
              kind: Probe
              metadata:
                name: morpheus-ui
                namespace: "alloy"
              spec:
                interval: 30s
                module: http_2xx
                prober:
                  url: alloy-alloy-metrics-cluster.alloy.svc:12345
                  path: /api/v0/component/prometheus.exporter.blackbox.blackbox_exporter/probe
                targets:
                  staticConfig:
                    static:
                      - https://morpheus.local.symmatree.com/
            - apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: otlp-ingress
                namespace: "alloy"
                annotations:
                  cert-manager.io/cluster-issuer: real-cert
                  external-dns.alpha.kubernetes.io/hostname: 'otlp.placeholder.symmatree.com'
              spec:
                ingressClassName: cilium
                tls:
                  - secretName: otlp-tls
                    hosts:
                      - 'otlp.placeholder.symmatree.com'
                rules:
                  - host: 'otlp.placeholder.symmatree.com'
                    http:
                      paths:
                        - path: /
                          pathType: Prefix
                          backend:
                            service:
                              name: alloy-alloy-receiver
                              port:
                                number: 4318
          alloy-singleton:
            extraConfig: |-
              mimir.rules.kubernetes "default" {
                address = "http://mimir-gateway.mimir.svc"
                tenant_id = "placeholder"
              }
    - repoURL: https://github.com/symmatree/tiles.git
      targetRevision: 'placeholder'
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        trust-bundle: enabled
