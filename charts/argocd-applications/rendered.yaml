          extraObjects:
            - apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: loki-loki-data
                namespace: "loki"
              spec:
                accessModes:
                  - ReadWriteMany
                resources:
                  requests:
                    storage: 100Gi
                volumeName: loki-loki-data
                storageClassName: ""
            - apiVersion: v1
              kind: ConfigMap
              metadata:
                name: loki-data-source
                namespace: "loki"
                labels:
                  grafana_datasource: "1"
              data:
                datasource.yaml: |-
                  apiVersion: 1
                  datasources:
                    - name: Loki
                      uid: loki
                      type: loki
                      url: http://loki.loki.svc:3100
                      isDefault: false
                      jsonData:
                        httpHeaderName1: X-Scope-OrgID
                      secureJsonData:
                        httpHeaderValue1: "placeholder"
